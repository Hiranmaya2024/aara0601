<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAradhya Flipbook</title>

<!-- PageFlip Library -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.min.css">

<style>
body {
  font-family: Arial;
  background: #e8f5e9;
  margin: 0;
  text-align: center;
}

h1 {
  background: #2e7d32;
  color: white;
  padding: 12px;
  margin: 0;
}

#book {
  width: 100%;
  max-width: 400px;
  height: 600px;
  margin: 20px auto;
}

.page {
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.upload-box {
  margin: 10px;
}

button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>AAradhya Flipbook</h1>

<div class="upload-box">
  <input type="file" id="upload" multiple accept="image/*">
  <br><br>
  <button onclick="addImages()">Upload Photos</button>
  <button onclick="saveFlipbook()">Save Flipbook</button>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<div id="book"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

// Initialize Flipbook
let pageFlip = new St.PageFlip(
  document.getElementById("book"),
  {
    width: 300,
    height: 500,
    size: "stretch",
    maxShadowOpacity: 0.5,
    showCover: true,
    mobileScrollSupport: true
  }
);

// Load saved images OR default
let savedImages = JSON.parse(localStorage.getItem("flipbook")) || [
  "https://via.placeholder.com/300x500?text=Welcome+to+AAradhya+Flipbook"
];

// Load pages into flipbook
function loadPages(images) {
  let pageElements = images.map(src => {
    let div = document.createElement("div");
    div.className = "page";
    div.innerHTML = `<img src="${src}" />`;
    return div;
  });

  document.getElementById("book").innerHTML = "";
  pageFlip.loadFromHTML(pageElements);
}

loadPages(savedImages);

// Upload images
function addImages() {
  let input = document.getElementById("upload");
  let files = input.files;

  for (let i = 0; i < files.length; i++) {
    let reader = new FileReader();

    reader.onload = function(e) {
      savedImages.push(e.target.result);
      loadPages(savedImages);
      saveFlipbook(); // auto save
    };

    reader.readAsDataURL(files[i]);
  }
}

// Save flipbook (Local Storage)
function saveFlipbook() {
  localStorage.setItem("flipbook", JSON.stringify(savedImages));
  alert("✅ Flipbook Saved Successfully!");
}

// Download flipbook as PDF
function downloadPDF() {
  let element = document.getElementById("book");

  let opt = {
    margin:       0,
    filename:     'AAradhya_Flipbook.pdf',
    image:        { type: 'jpeg', quality: 1 },
    html2canvas:  { scale: 2 },
    jsPDF:        { unit: 'px', format: [300, 500], orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save();
}

</script>

</body>
</html>
