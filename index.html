<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aaradhya Pharma Ordering</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0f1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5b0;
    --accent2: #0099ff;
    --text: #e8edf5;
    --muted: #6b7a99;
    --danger: #ff4d6d;
    --card-glow: rgba(0, 229, 176, 0.06);
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,229,176,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(0,153,255,0.06) 0%, transparent 60%);
  }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(11,15,26,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .brand-name {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .brand-sub {
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ─── CART BUTTON ─── */
  #cartBtn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }

  #cartBtn:hover {
    border-color: var(--accent);
    background: rgba(0,229,176,0.08);
    color: var(--accent);
  }

  .cart-badge {
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    padding: 2px 6px;
    border-radius: 20px;
    min-width: 20px;
    text-align: center;
    line-height: 1.4;
  }

  /* ─── CONTAINER ─── */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .item-count {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(0,229,176,0.08);
    border: 1px solid rgba(0,229,176,0.2);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* ─── GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    border-color: rgba(0,229,176,0.25);
    background: var(--surface2);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,229,176,0.1);
  }

  .card:hover::before { opacity: 1; }

  .card h4 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.4;
    min-height: 2.8em;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .meta-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
  }

  .meta-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 3px;
  }

  .meta-value {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
  }

  .meta-value.price { color: var(--accent); }
  .meta-value.mrp { color: var(--text); }

  .full-row {
    grid-column: 1 / -1;
  }

  /* ─── QTY BOX ─── */
  .qty-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0;
    margin-top: 6px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .qty-box button {
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 18px;
    font-weight: 700;
    width: 38px;
    height: 38px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    font-family: 'Space Mono', monospace;
    border-radius: 0;
    padding: 0;
  }

  .qty-box button:hover { background: rgba(0,229,176,0.1); }
  .qty-box button:active { background: rgba(0,229,176,0.2); }

  .qty-box span {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    min-width: 32px;
    text-align: center;
  }

  /* ─── PAGINATION ─── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 40px;
    padding: 20px;
  }

  .pagination button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .pagination button:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,176,0.06);
  }

  #pageNum {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 9px 16px;
    border-radius: 10px;
    min-width: 80px;
    text-align: center;
  }

  /* ─── MODAL ─── */
  #cartModal {
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 16, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  #cartModal.open {
    display: flex;
  }

  .modal-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 92%;
    max-width: 560px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1) both;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .modal-header h3 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  #cartItems {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .cart-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    gap: 12px;
  }

  .cart-row-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }

  .cart-row-qty {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .cart-row-price {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }

  .cart-total {
    background: rgba(0,229,176,0.06);
    border: 1px solid rgba(0,229,176,0.2);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .cart-total-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .cart-total-value {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 7px;
    border: none;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    justify-content: center;
    min-width: 120px;
  }

  .btn-pdf {
    background: rgba(0,229,176,0.12);
    border: 1px solid rgba(0,229,176,0.3);
    color: var(--accent);
  }

  .btn-pdf:hover {
    background: rgba(0,229,176,0.2);
    transform: translateY(-1px);
  }

  .btn-wa {
    background: rgba(37,211,102,0.12);
    border: 1px solid rgba(37,211,102,0.3);
    color: #25d366;
  }

  .btn-wa:hover {
    background: rgba(37,211,102,0.2);
    transform: translateY(-1px);
  }

  .btn-close {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .btn-close:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    flex: 0;
    min-width: 80px;
  }

  /* ─── EMPTY STATE ─── */
  .empty-cart {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .empty-cart-icon { font-size: 40px; margin-bottom: 12px; }

  /* ─── LOADING ─── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 14px;
    gap: 12px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Stagger cards */
  .card:nth-child(1)  { animation-delay: 0.02s; }
  .card:nth-child(2)  { animation-delay: 0.04s; }
  .card:nth-child(3)  { animation-delay: 0.06s; }
  .card:nth-child(4)  { animation-delay: 0.08s; }
  .card:nth-child(5)  { animation-delay: 0.10s; }
  .card:nth-child(6)  { animation-delay: 0.12s; }
  .card:nth-child(7)  { animation-delay: 0.14s; }
  .card:nth-child(8)  { animation-delay: 0.16s; }
  .card:nth-child(9)  { animation-delay: 0.18s; }
  .card:nth-child(10) { animation-delay: 0.20s; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>

<body>

<header>
  <div class="brand">
    <div class="brand-icon">💊</div>
    <div>
      <div class="brand-name">Aaradhya Pharma</div>
      <div class="brand-sub">Ordering Portal</div>
    </div>
  </div>
  <button id="cartBtn" onclick="openCart()">
    🛒 Cart
    <span class="cart-badge" id="cartCount">0</span>
  </button>
</header>

<div class="container">
  <div class="section-header">
    <span class="section-title">Products</span>
    <span class="item-count" id="itemCount">—</span>
  </div>

  <div id="items" class="grid">
    <div class="loading" style="grid-column:1/-1">
      <div class="spinner"></div> Loading catalogue…
    </div>
  </div>

  <div class="pagination">
    <button onclick="prevPage()">← Prev</button>
    <span id="pageNum">Page 1</span>
    <button onclick="nextPage()">Next →</button>
  </div>
</div>

<!-- CART MODAL -->
<div id="cartModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>🛒 Order Summary</h3>
    </div>
    <div id="cartItems"></div>
    <div class="cart-total">
      <span class="cart-total-label">Grand Total</span>
      <span class="cart-total-value" id="total">₹0</span>
    </div>
    <div class="modal-actions">
      <button class="btn btn-pdf" onclick="downloadPDF()">⬇ Download PDF</button>
      <button class="btn btn-wa" onclick="shareWhatsApp()">💬 WhatsApp</button>
      <button class="btn btn-close" onclick="closeCart()">Close</button>
    </div>
  </div>
</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIA-e9LgjI3ZEthvS_-N-XsurvTJu_XrxpWnIypbqMXNXLB95DaFG1qXv9kvTrrU4_0Fw5ZjVDxxZc/pub?gid=1990410876&single=true&output=csv";

let data = [];
let cart = [];
let currentPage = 1;
const perPage = 10;

// LOAD DATA
async function loadData() {
  const res = await fetch(sheetURL);
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  data = rows.map(row => {
    const cols = row.split(",");
    return {
      name: cols[1],
      stock: cols[2],
      mrp: cols[4],
      rate: cols[5],
      batch: cols[8],
      expiry: cols[9]
    };
  });

  render();
}

// RENDER ITEMS
function render() {
  const start = (currentPage - 1) * perPage;
  const pageData = data.slice(start, start + perPage);

  const container = document.getElementById("items");
  container.innerHTML = "";

  document.getElementById("itemCount").textContent = data.length + " items";

  pageData.forEach(item => {

    let cartItem = cart.find(i => i.name === item.name);
    let qty = cartItem ? cartItem.qty : 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h4>${item.name}</h4>
      <div class="card-meta">
        <div class="meta-item">
          <div class="meta-label">Rate</div>
          <div class="meta-value price">₹${item.rate}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">MRP</div>
          <div class="meta-value mrp">₹${item.mrp}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Stock</div>
          <div class="meta-value">${item.stock}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Batch</div>
          <div class="meta-value">${item.batch}</div>
        </div>
        <div class="meta-item full-row">
          <div class="meta-label">Expiry</div>
          <div class="meta-value">${item.expiry}</div>
        </div>
      </div>
      <div class="qty-box">
        <button onclick='decreaseQty("${item.name}")'>−</button>
        <span>${qty}</span>
        <button onclick='increaseQty(${JSON.stringify(item)})'>+</button>
      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("pageNum").innerText = "Page " + currentPage;
}

// PAGINATION
function nextPage() {
  if ((currentPage * perPage) < data.length) {
    currentPage++;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// INCREASE QTY
function increaseQty(item) {
  let existing = cart.find(i => i.name === item.name);

  if (existing) {
    existing.qty++;
  } else {
    cart.push({...item, qty: 1});
  }

  updateCartCount();
  render();
}

// DECREASE QTY
function decreaseQty(name) {
  let index = cart.findIndex(i => i.name === name);

  if (index !== -1) {
    cart[index].qty--;

    if (cart[index].qty <= 0) {
      cart.splice(index, 1);
    }
  }

  updateCartCount();
  render();
}

// CART COUNT
function updateCartCount() {
  let totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
  document.getElementById("cartCount").innerText = totalQty;
}

// OPEN CART
function openCart() {
  const div = document.getElementById("cartItems");
  div.innerHTML = "";

  let total = 0;

  if (cart.length === 0) {
    div.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon">🛒</div>Your cart is empty</div>`;
  } else {
    cart.forEach(item => {
      let value = item.rate * item.qty;
      total += value;

      div.innerHTML += `
        <div class="cart-row">
          <span class="cart-row-name">${item.name}</span>
          <span class="cart-row-qty">× ${item.qty}</span>
          <span class="cart-row-price">₹${value}</span>
        </div>
      `;
    });
  }

  document.getElementById("total").innerText = "₹" + total;
  const modal = document.getElementById("cartModal");
  modal.style.display = "flex";
  modal.classList.add("open");
}

function closeCart() {
  const modal = document.getElementById("cartModal");
  modal.style.display = "none";
  modal.classList.remove("open");
}

// PDF DOWNLOAD
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;
  doc.text("Aaradhya Pharma Order", 10, y);
  y += 10;

  let total = 0;

  cart.forEach(item => {
    let value = item.rate * item.qty;
    total += value;

    doc.text(`${item.name} - Qty: ${item.qty} - ₹${value}`, 10, y);
    y += 10;
  });

  doc.text("Total: ₹" + total, 10, y + 10);

  doc.save("order.pdf");
}

// WHATSAPP SHARE
function shareWhatsApp() {
  let text = "Order Details:\n";
  let total = 0;

  cart.forEach(item => {
    let value = item.rate * item.qty;
    total += value;
    text += `${item.name} - Qty: ${item.qty} - ₹${value}\n`;
  });

  text += `Total: ₹${total}`;

  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

// INIT
loadData();

</script>

</body>
</html>
