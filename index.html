<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAradhya Flipbook</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.min.css">

<style>
body {
  font-family: Arial;
  background: #e8f5e9;
  margin: 0;
  text-align: center;
}

h1 {
  background: #2e7d32;
  color: white;
  padding: 12px;
  margin: 0;
}

#book {
  width: 100%;
  max-width: 400px;
  height: 600px;
  margin: 20px auto;
}

.page {
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.upload-box {
  margin: 10px;
}

button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>AAradhya Flipbook</h1>

<div class="upload-box">
  <input type="file" id="upload" multiple accept="image/*">
  <br><br>
  <button onclick="addImages()">Upload Photos</button>
  <button onclick="saveFlipbook()">Save (Browser)</button>
  <button onclick="saveFlipbookFile()">Save Flipbook File</button>
  <button onclick="loadFlipbookFile()">Load Flipbook</button>
  <button onclick="downloadPDF()">Download PDF</button>
  <input type="file" id="loadFile" style="display:none" accept=".json">
</div>

<div id="book"></div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// INIT FLIPBOOK
let pageFlip = new St.PageFlip(document.getElementById("book"), {
  width: 300,
  height: 500,
  size: "stretch",
  maxShadowOpacity: 0.5,
  showCover: true,
  mobileScrollSupport: true
});

// LOAD SAVED OR DEFAULT
let savedImages = JSON.parse(localStorage.getItem("flipbook")) || [
  "https://via.placeholder.com/300x500?text=AAradhya+Flipbook"
];

// LOAD PAGES
function loadPages(images) {
  let pageElements = images.map(src => {
    let div = document.createElement("div");
    div.className = "page";
    div.innerHTML = `<img src="${src}" />`;
    return div;
  });

  document.getElementById("book").innerHTML = "";
  pageFlip.loadFromHTML(pageElements);
}

loadPages(savedImages);

// UPLOAD IMAGES
function addImages() {
  let input = document.getElementById("upload");
  let files = input.files;

  for (let i = 0; i < files.length; i++) {
    let reader = new FileReader();

    reader.onload = function(e) {
      savedImages.push(e.target.result);
      loadPages(savedImages);
      saveFlipbook();
    };

    reader.readAsDataURL(files[i]);
  }
}

// SAVE IN BROWSER
function saveFlipbook() {
  localStorage.setItem("flipbook", JSON.stringify(savedImages));
  alert("✅ Saved in browser");
}

// SAVE AS FILE
function saveFlipbookFile() {
  const dataStr = JSON.stringify(savedImages);
  const blob = new Blob([dataStr], { type: "application/json" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "AAradhya_Flipbook.json";
  a.click();
}

// LOAD FILE
function loadFlipbookFile() {
  document.getElementById("loadFile").click();
}

document.getElementById("loadFile").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    savedImages = JSON.parse(event.target.result);
    loadPages(savedImages);
    saveFlipbook();
  };

  reader.readAsText(file);
});

// DOWNLOAD PDF (MULTI PAGE)
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  let pdf = new jsPDF();

  let i = 0;

  function addPage() {
    if (i >= savedImages.length) {
      pdf.save("AAradhya_Flipbook.pdf");
      return;
    }

    let img = new Image();
    img.src = savedImages[i];

    img.onload = function() {
      if (i > 0) pdf.addPage();

      pdf.addImage(img, 'JPEG', 10, 10, 180, 260);

      i++;
      addPage();
    };
  }

  addPage();
}

</script>

</body>
</html>
