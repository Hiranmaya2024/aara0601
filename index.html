<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAradhya Flipbook</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.min.css">

<style>
body {
  font-family: Arial;
  background: #e8f5e9;
  margin: 0;
  text-align: center;
}

h1 {
  background: #2e7d32;
  color: white;
  padding: 10px;
  margin: 0;
}

#book {
  width: 100%;
  max-width: 400px;
  height: 600px;
  margin: 20px auto;
}

.page {
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.upload-box {
  margin: 10px;
}

button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<h1>AAradhya Flipbook</h1>

<div class="upload-box">
  <input type="file" id="upload" multiple accept="image/*">
  <button onclick="addImages()">Upload Photos</button>
</div>

<div id="book"></div>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

<script>

let pageFlip = new St.PageFlip(
  document.getElementById("book"),
  {
    width: 300,
    height: 500,
    size: "stretch",
    maxShadowOpacity: 0.5,
    showCover: true,
    mobileScrollSupport: true
  }
);

let pages = [];

// 👉 Default images (ADD YOUR EXISTING IMAGES HERE)
let defaultImages = [
  "https://via.placeholder.com/300x500?text=Page+1",
  "https://via.placeholder.com/300x500?text=Page+2"
];

function loadPages(images) {
  let pageElements = images.map(src => {
    let div = document.createElement("div");
    div.className = "page";
    div.innerHTML = `<img src="${src}" />`;
    return div;
  });

  document.getElementById("book").innerHTML = "";
  pageFlip.loadFromHTML(pageElements);
}

loadPages(defaultImages);

// 📤 Upload function
function addImages() {
  let input = document.getElementById("upload");
  let files = input.files;

  for (let i = 0; i < files.length; i++) {
    let reader = new FileReader();

    reader.onload = function(e) {
      defaultImages.push(e.target.result);
      loadPages(defaultImages);
    };

    reader.readAsDataURL(files[i]);
  }
}

</script>

</body>
</html>
