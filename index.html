<!DOCTYPE html>
<html>
<head>
  <title>Aaradhya Credit App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 15px;
    }

    input {
      padding: 12px;
      width: 100%;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      width: 100%;
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .green { color: #00ff99; }
    .orange { color: orange; }
    .grey { color: grey; }
    .red { color: red; }

  </style>
</head>

<body>

<h2>💳 Aaradhya Credit</h2>

<div id="login">
  <input type="text" id="mobile" placeholder="Enter Mobile Number">
  <button onclick="loadBills()">Login</button>
</div>

<div id="app" style="display:none;">
  <h3>Your Bills</h3>
  <div id="bills"></div>
</div>

<script>

const API_URL = "https://opensheet.elk.sh/11orq7_xPP6119UFEy8Jlx4CcHey1AtSmunnATlfT8p0/Sheet1";

function daysBetween(date) {
  let d1 = new Date(date);
  let d2 = new Date();
  return Math.floor((d2 - d1) / (1000*60*60*24));
}

function calculate(bill) {
  let days = daysBetween(bill["Date"]);
  let amount = parseFloat(bill["Amount"]);

  let discount = 0;
  let points = 0;
  let interest = 0;
  let status = "";

  if (days <= 15) {
    discount = amount * 0.02;
    points = 100;
    status = "green";
  } 
  else if (days <= 30) {
    points = 50;
    status = "orange";
  } 
  else if (days <= 45) {
    status = "grey";
  } 
  else if (days > 60) {
    interest = amount * 0.24/365 * (days - 60);
    status = "red";
  }

  return {days, discount, points, interest, status};
}

async function loadBills() {
  let mobile = document.getElementById("mobile").value.trim();

  if (!mobile) {
    alert("Enter mobile number");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  let res = await fetch(API_URL);
  let data = await res.json();

  let filtered = data.filter(b => 
    b["Customer Mobile"] == mobile && 
    b["Paid"] != "TRUE"
  );

  let html = "";

  filtered.forEach(bill => {
    let calc = calculate(bill);

    html += `
      <div class="card">
        <h3>${bill["Bill No"]}</h3>
        <p>Amount: ₹${bill["Amount"]}</p>
        <p>Days Passed: ${calc.days}</p>

        <p class="${calc.status}">
          ${calc.days <= 15 ? "CD Discount Active" : ""}
          ${calc.days > 15 && calc.days <= 30 ? "Rewards Only" : ""}
          ${calc.days > 30 && calc.days <= 45 ? "No Benefits" : ""}
          ${calc.days > 60 ? "Interest Running" : ""}
        </p>

        <p>Discount: ₹${calc.discount.toFixed(2)}</p>
        <p>Points: ${calc.points}</p>
        <p>Interest: ₹${calc.interest.toFixed(2)}</p>

        <button onclick="payBill('${bill["Bill No"]}')">
          Pay Now
        </button>
      </div>
    `;
  });

  document.getElementById("bills").innerHTML = html || "<p>No bills found</p>";
}

function payBill(id) {
  alert("Simulated Payment for " + id);
}

</script>

</body>
</html>
